      <div class="flow">
        <div class="flow-item"><div class="flow-n">1</div><div class="flow-t"><strong>SENSE</strong> · LDR reads light → 0 to 1023</div></div>
        <div class="flow-item"><div class="flow-n">2</div><div class="flow-t"><strong>DARK</strong> · Below 300 → Lamp ON via relay</div></div>
        <div class="flow-item"><div class="flow-n">3</div><div class="flow-t"><strong>BRIGHT</strong> · Above 600 → Lamp OFF</div></div>
        <div class="flow-item"><div class="flow-n">4</div><div class="flow-t"><strong>BAND</strong> · 300–600 = no change (hysteresis)</div></div>
      </div>
    </div>
    <div class="task-r">
      <div>
        <div class="pane-label">Arduino Code</div>
        <div class="code"><span class="c">// Task 6: LDR Auto Street Light
// Author: Joyal Varghese</span>

<span class="k">int</span>  ldrPin   = <span class="v">A0</span>;
<span class="k">int</span>  ledPin   = <span class="v">9</span>;
<span class="k">int</span>  relayPin = <span class="v">8</span>;
<span class="k">bool</span> lampOn   = <span class="v">false</span>;

<span class="k">const int</span> DARK   = <span class="v">300</span>;
<span class="k">const int</span> BRIGHT = <span class="v">600</span>;

<span class="k">void</span> <span class="f">setup</span>() {
  <span class="f">pinMode</span>(ledPin,   OUTPUT);
  <span class="f">pinMode</span>(relayPin, OUTPUT);
  Serial.<span class="f">begin</span>(<span class="v">9600</span>);
}

<span class="k">void</span> <span class="f">loop</span>() {
  <span class="k">int</span> ldr = <span class="f">analogRead</span>(ldrPin);
  Serial.<span class="f">print</span>(<span class="s">"LDR: "</span>); Serial.<span class="f">println</span>(ldr);

  <span class="k">if</span>(ldr < DARK)          lampOn = <span class="v">true</span>;
  <span class="k">else if</span>(ldr > BRIGHT)   lampOn = <span class="v">false</span>;
  <span class="c">// Hysteresis: no change between 300–600</span>

  <span class="f">digitalWrite</span>(ledPin,   lampOn ? HIGH : LOW);
  <span class="f">digitalWrite</span>(relayPin, lampOn ? LOW  : HIGH);
  <span class="f">delay</span>(<span class="v">500</span>);
}</div>
      </div>
      <div>
        <div class="pane-label">Pin Connections</div>
        <table class="ptable">
          <tr><th>Component</th><th>Arduino</th><th>Notes</th></tr>
