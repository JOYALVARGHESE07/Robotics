        <div class="pane-label">Arduino Code</div>
        <div class="code"><span class="c">// Task 5: LCD Information Display
// Author: Joyal Varghese</span>

<span class="p">#include</span> &lt;<span class="f">LiquidCrystal.h</span>&gt;

<span class="c">// RS, EN, D4, D5, D6, D7</span>
LiquidCrystal <span class="f">lcd</span>(<span class="v">12</span>,<span class="v">11</span>,<span class="v">5</span>,<span class="v">4</span>,<span class="v">3</span>,<span class="v">2</span>);
<span class="k">int</span>   potPin = <span class="v">A0</span>;
<span class="k">float</span> voltage;

<span class="k">void</span> <span class="f">setup</span>() {
  lcd.<span class="f">begin</span>(<span class="v">16</span>, <span class="v">2</span>);
  lcd.<span class="f">print</span>(<span class="s">"SYSTEM STATUS"</span>);
  <span class="f">delay</span>(<span class="v">1500</span>);
  lcd.<span class="f">clear</span>();
}

<span class="k">void</span> <span class="f">loop</span>() {
  <span class="k">int</span> raw = <span class="f">analogRead</span>(potPin);
  voltage  = raw * (<span class="v">5.0</span> / <span class="v">1023.0</span>);

  lcd.<span class="f">setCursor</span>(<span class="v">0</span>, <span class="v">0</span>);
  lcd.<span class="f">print</span>(<span class="s">"Pot: "</span>); lcd.<span class="f">print</span>(raw);
  lcd.<span class="f">print</span>(<span class="s">"       "</span>);

  lcd.<span class="f">setCursor</span>(<span class="v">0</span>, <span class="v">1</span>);
  lcd.<span class="f">print</span>(<span class="s">"V: "</span>); lcd.<span class="f">print</span>(voltage, <span class="v">2</span>);
  lcd.<span class="f">print</span>(<span class="s">"V      "</span>);

  <span class="f">delay</span>(<span class="v">200</span>);
}</div>
