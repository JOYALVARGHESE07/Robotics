<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Embedded Systems Portfolio — Joyal Varghese</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --black:#0a0a08;
  --deep:#0f0f0b;
  --surface:#141410;
  --card:#1a1a15;
  --card-light:#1f1f19;
  --border:#2a2a20;
  --border-gold:#8a7040;
  --gold:#c9a84c;
  --gold-bright:#e8c96d;
  --gold-dim:#5a4820;
  --gold-pale:#f5e8c0;
  --cream:#d4c9a0;
  --white:#f0ebe0;
  --muted:#6a6050;
  --text:#a09070;
  --text-light:#c4b898;
  --green-rolex:#007a4d;
  --green-light:#00a366;
}

html{scroll-behavior:smooth}

body{
  background:var(--black);
  color:var(--text);
  font-family:'Montserrat',sans-serif;
  font-weight:300;
  overflow-x:hidden;
  cursor:default;
}

/* SUBTLE GRAIN TEXTURE */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:0.6;
}

/* CROWN WATERMARK */
body::after{
  content:'';
  position:fixed;
  bottom:-100px;right:-100px;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(201,168,76,0.03) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ═══════════════ HEADER ═══════════════ */
header{
  padding:0;
  border-bottom:1px solid var(--border-gold);
  position:relative;overflow:hidden;
  background:linear-gradient(160deg,#0f0f0b 0%,#1a1a12 50%,#0f0f0b 100%);
}

.header-top-bar{
  background:var(--green-rolex);
  padding:10px 80px;
  display:flex;justify-content:space-between;align-items:center;
}
.header-top-bar span{
  font-size:9px;letter-spacing:4px;text-transform:uppercase;
  color:rgba(255,255,255,0.7);font-family:'Montserrat',sans-serif;
  font-weight:400;
}

.header-inner{
  padding:70px 80px 60px;
  display:grid;grid-template-columns:1fr auto;gap:60px;align-items:center;
  position:relative;
}

/* DECORATIVE GOLD LINES */
.header-inner::before{
  content:'';position:absolute;
  left:80px;top:0;
  width:1px;height:100%;
  background:linear-gradient(180deg,transparent,var(--gold-dim),transparent);
}

.header-emblem{
  display:flex;align-items:center;gap:24px;margin-bottom:20px;
}

.rolex-crown{
  width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
}

.rolex-crown svg{fill:var(--gold);}

.brand-line{
  font-family:'Cormorant+Garamond','Cormorant Garamond',Georgia,serif;
  font-size:11px;letter-spacing:6px;text-transform:uppercase;
  color:var(--gold);font-weight:400;
}

.header-title{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(38px,5.5vw,68px);
  font-weight:300;
  color:var(--white);
  line-height:1.05;
  letter-spacing:-0.5px;
}
.header-title em{
  font-style:italic;
  color:var(--gold);
}

.header-sub{
  font-size:10px;letter-spacing:5px;text-transform:uppercase;
  color:var(--muted);margin-top:20px;
  font-family:'Montserrat',sans-serif;font-weight:400;
}

.author-medallion{
  width:240px;
  background:linear-gradient(145deg,#1a1a12,#0f0f0b);
  border:1px solid var(--border-gold);
  padding:36px 28px;
  text-align:center;
  position:relative;
}
.author-medallion::before{
  content:'';position:absolute;
  inset:4px;border:1px solid rgba(201,168,76,0.15);
  pointer-events:none;
}

.medallion-crown{
  width:32px;height:32px;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;
}

.medallion-label{
  font-size:8px;letter-spacing:5px;text-transform:uppercase;
  color:var(--gold);font-family:'Montserrat',sans-serif;
  margin-bottom:12px;font-weight:500;
}
.medallion-name{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:22px;font-weight:400;color:var(--white);
  letter-spacing:1px;line-height:1.2;
}
.medallion-id{
  font-size:8px;color:var(--muted);margin-top:10px;
  font-family:'Montserrat',sans-serif;letter-spacing:3px;
  text-transform:uppercase;
}
.medallion-divider{
  width:40px;height:1px;background:var(--gold-dim);
  margin:14px auto;
}

/* ═══════════════ MAIN ═══════════════ */
main{padding:80px;position:relative;z-index:1;}

.tasks-grid{
  display:grid;grid-template-columns:1fr;gap:2px;
}

/* Gold rule between tasks */
.tasks-grid > * + *{
  border-top:1px solid var(--border);
}

/* ═══════════════ TASK CARD ═══════════════ */
.task-card{
  background:var(--card);
  border:1px solid var(--border);
  position:relative;overflow:hidden;
  transition:border-color 0.4s ease;
}

.task-card:hover{
  border-color:var(--border-gold);
}

/* Left accent bar */
.task-card::before{
  content:'';position:absolute;
  top:0;left:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--accent-color,var(--gold)),transparent 80%);
}

/* Top accent line */
.task-card::after{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--accent-color,var(--gold)),transparent 60%);
}

.task-card-header{
  display:grid;grid-template-columns:100px 1fr auto;gap:32px;align-items:center;
  padding:40px 48px 32px 52px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,rgba(201,168,76,0.03),transparent);
}

.task-num{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:72px;font-weight:300;
  color:var(--accent-color,var(--gold));
  opacity:0.15;line-height:1;
  letter-spacing:-2px;
}

.task-tag{
  font-size:8px;letter-spacing:5px;text-transform:uppercase;
  color:var(--accent-color,var(--gold));
  font-family:'Montserrat',sans-serif;font-weight:500;
  margin-bottom:8px;
}
.task-title{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(20px,2.5vw,28px);font-weight:400;
  color:var(--white);line-height:1.2;
  letter-spacing:0.3px;
}
.task-subtitle{
  font-size:10px;color:var(--muted);margin-top:6px;
  font-family:'Montserrat',sans-serif;font-weight:300;
  letter-spacing:2px;text-transform:uppercase;
}

.task-badge{
  background:transparent;
  border:1px solid var(--accent-color,var(--gold));
  padding:8px 18px;
  font-size:8px;letter-spacing:4px;text-transform:uppercase;
  color:var(--accent-color,var(--gold));
  font-family:'Montserrat',sans-serif;font-weight:500;
  white-space:nowrap;
}

/* ═══════════════ TASK BODY ═══════════════ */
.task-body{
  display:grid;grid-template-columns:1fr 1fr;
}

.task-section{
  padding:32px 48px 32px 52px;
  border-right:1px solid var(--border);
}
.task-section:last-child{border-right:none;}
.task-section:nth-child(3){border-top:1px solid var(--border);}
.task-section:nth-child(4){border-top:1px solid var(--border);}
.task-section[style*="grid-column"]{
  padding:28px 48px 28px 52px;
}

.sec-label{
  font-size:7px;letter-spacing:5px;text-transform:uppercase;
  color:var(--gold);font-family:'Montserrat',sans-serif;font-weight:600;
  margin-bottom:16px;display:flex;align-items:center;gap:12px;
}
.sec-label::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--border-gold),transparent);
}

/* ═══════════════ COMPONENTS ═══════════════ */
.comp-list{display:flex;flex-wrap:wrap;gap:8px;}
.comp-tag{
  background:transparent;
  border:1px solid var(--border);
  padding:5px 14px;
  font-size:9px;color:var(--text);
  font-family:'Montserrat',sans-serif;font-weight:400;
  letter-spacing:1px;
  transition:border-color 0.3s;
}
.comp-tag.primary{
  border-color:var(--accent-color,var(--gold));
  color:var(--accent-color,var(--gold));
}

/* ═══════════════ DESCRIPTION ═══════════════ */
.task-desc{
  font-size:13px;line-height:2;color:var(--text-light);
  font-family:'Montserrat',sans-serif;font-weight:300;
}

/* ═══════════════ FLOW STEPS ═══════════════ */
.flow-steps{display:flex;flex-direction:column;gap:0;}
.flow-step{
  display:flex;align-items:flex-start;gap:16px;
  padding:10px 0;border-bottom:1px solid rgba(42,42,32,0.6);
}
.flow-step:last-child{border-bottom:none;}
.flow-n{
  width:22px;height:22px;
  border:1px solid var(--accent-color,var(--gold));
  color:var(--accent-color,var(--gold));
  font-family:'Cormorant Garamond',Georgia,serif;font-size:12px;font-weight:400;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.flow-t{font-size:12px;color:var(--text-light);line-height:1.7;font-weight:300;}

/* ═══════════════ CODE BLOCK ═══════════════ */
.code-block{
  background:#080806;
  border:1px solid var(--border);
  padding:20px 24px;
  font-family:'Courier New',monospace;
  font-size:11px;line-height:1.9;
  color:#6a7a60;
  overflow-x:auto;
}
.kw{color:var(--gold);}
.fn{color:#a0b878;}
.cm{color:#3a3a2a;}
.val{color:#c8b878;}
.str{color:#a08860;}

/* ═══════════════ REAL-WORLD BOX ═══════════════ */
.rw-box{
  background:rgba(201,168,76,0.03);
  border-left:2px solid var(--accent-color,var(--gold));
  padding:20px 24px;
  margin-top:0;
}
.rw-title{
  font-size:7px;letter-spacing:5px;text-transform:uppercase;
  color:var(--accent-color,var(--gold));font-family:'Montserrat',sans-serif;font-weight:600;
  margin-bottom:12px;
}
.rw-items{list-style:none;}
.rw-items li{
  font-size:12px;color:var(--text);padding:4px 0;
  font-family:'Montserrat',sans-serif;font-weight:300;
}
.rw-items li::before{
  content:'— ';color:var(--accent-color,var(--gold));
}

/* ═══════════════ PIN TABLE ═══════════════ */
.pin-table{width:100%;border-collapse:collapse;}
.pin-table th{
  font-size:7px;letter-spacing:4px;text-transform:uppercase;
  color:var(--muted);font-family:'Montserrat',sans-serif;font-weight:500;
  text-align:left;padding:8px 12px;
  border-bottom:1px solid var(--border-gold);
}
.pin-table td{
  font-size:11px;color:var(--text-light);
  font-family:'Courier New',monospace;
  padding:8px 12px;
  border-bottom:1px solid rgba(42,42,32,0.5);
}
.pin-table td:first-child{color:var(--accent-color,var(--gold));}

/* ═══════════════ ACCENT COLORS ═══════════════ */
.t1{--accent-color:#c9a84c;}
.t2{--accent-color:#a8c878;}
.t3{--accent-color:#c8a878;}
.t4{--accent-color:#c87878;}
.t5{--accent-color:#78a8c8;}
.t6{--accent-color:#c8c878;}
.t7{--accent-color:#a878c8;}

/* ═══════════════ FOOTER ═══════════════ */
footer{
  padding:48px 80px;
  border-top:1px solid var(--border-gold);
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(90deg,var(--surface),var(--black));
  position:relative;z-index:1;
}

.footer-crown{
  display:flex;align-items:center;gap:20px;
}

.footer-name{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:20px;color:var(--gold);font-weight:400;
  letter-spacing:2px;
}
.footer-sub{
  font-size:8px;letter-spacing:4px;text-transform:uppercase;
  color:var(--muted);margin-top:6px;font-family:'Montserrat',sans-serif;
}
.footer-meta{
  text-align:right;
}
.footer-meta p{
  font-size:9px;color:var(--muted);letter-spacing:3px;
  text-transform:uppercase;font-family:'Montserrat',sans-serif;
  margin-top:4px;
}
.footer-meta p:first-child{margin-top:0;}

/* Gold divider ornament */
.gold-ornament{
  display:flex;align-items:center;gap:12px;
  padding:16px 80px;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  background:rgba(201,168,76,0.02);
}
.ornament-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border-gold),transparent);}
.ornament-diamond{
  width:6px;height:6px;background:var(--gold-dim);
  transform:rotate(45deg);
}
.ornament-text{
  font-size:8px;letter-spacing:6px;text-transform:uppercase;
  color:var(--gold);font-family:'Montserrat',sans-serif;font-weight:500;
}

/* ═══════════════ SUMMARY BAR ═══════════════ */
.summary-bar{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid var(--border);
}
.summary-item{
  padding:28px 80px;
  border-right:1px solid var(--border);
  text-align:center;
}
.summary-item:last-child{border-right:none;}
.summary-num{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:36px;font-weight:300;color:var(--gold);
  line-height:1;
}
.summary-label{
  font-size:8px;letter-spacing:4px;text-transform:uppercase;
  color:var(--muted);margin-top:8px;font-family:'Montserrat',sans-serif;
}

@media(max-width:900px){
  header .header-inner{padding:40px 24px;grid-template-columns:1fr;}
  .header-top-bar{padding:10px 24px;}
  main{padding:30px 24px;}
  .task-body{grid-template-columns:1fr;}
  .task-section{border-right:none;border-top:1px solid var(--border);}
  .task-section:first-child{border-top:none;}
  .task-card-header{grid-template-columns:60px 1fr;padding:24px;}
  .task-badge{display:none;}
  footer{flex-direction:column;gap:20px;padding:30px 24px;text-align:center;}
  .footer-meta{text-align:center;}
  .summary-bar{grid-template-columns:repeat(2,1fr);}
  .summary-item{padding:20px;}
  .gold-ornament{padding:12px 24px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-top-bar">
    <span>Embedded Systems Design Laboratory</span>
    <span>Arduino · C++ · Microcontroller Engineering</span>
  </div>

  <div class="header-inner">
    <div>
      <div class="header-emblem">
        <!-- Crown SVG -->
        <div class="rolex-crown">
          <svg viewBox="0 0 48 36" width="48" height="36" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 2 L28 10 L36 6 L32 14 L44 12 L38 22 L44 26 L4 26 L10 22 L4 12 L16 14 L12 6 L20 10 Z" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linejoin="round"/>
            <rect x="4" y="28" width="40" height="3" rx="0" fill="#c9a84c" opacity="0.6"/>
            <rect x="2" y="33" width="44" height="1.5" rx="0" fill="#c9a84c" opacity="0.4"/>
          </svg>
        </div>
        <div class="brand-line">Systems Portfolio · Est. 2024</div>
      </div>

      <h1 class="header-title">
        Output &amp; Control<br/>
        <em>Systems Laboratory</em>
      </h1>
      <p class="header-sub">Seven Task Portfolio &nbsp;·&nbsp; Arduino Uno &nbsp;·&nbsp; C++ Arduino IDE</p>
    </div>

    <div class="author-medallion">
      <div class="medallion-crown">
        <svg viewBox="0 0 32 24" width="32" height="24" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 1 L19 7 L25 4 L22 10 L30 8 L26 15 L30 18 L2 18 L6 15 L2 8 L10 10 L7 4 L13 7 Z" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-linejoin="round"/>
          <rect x="2" y="20" width="28" height="2" fill="#c9a84c" opacity="0.5"/>
        </svg>
      </div>
      <div class="medallion-label">Designed By</div>
      <div class="medallion-divider"></div>
      <div class="medallion-name">Joyal<br/>Varghese</div>
      <div class="medallion-divider"></div>
      <div class="medallion-id">Systems Design Portfolio</div>
    </div>
  </div>

  <!-- Summary Bar -->
  <div class="summary-bar">
    <div class="summary-item">
      <div class="summary-num">7</div>
      <div class="summary-label">Tasks Completed</div>
    </div>
    <div class="summary-item">
      <div class="summary-num">7</div>
      <div class="summary-label">Unique Systems</div>
    </div>
    <div class="summary-item">
      <div class="summary-num">C++</div>
      <div class="summary-label">Language</div>
    </div>
    <div class="summary-item">
      <div class="summary-num">UNO</div>
      <div class="summary-label">Platform</div>
    </div>
  </div>
</header>

<main>

<!-- ORNAMENT -->
<div class="gold-ornament" style="padding:14px 0;margin-bottom:40px">
  <div class="ornament-line"></div>
  <div class="ornament-diamond"></div>
  <div class="ornament-text">Project Collection</div>
  <div class="ornament-diamond"></div>
  <div class="ornament-line"></div>
</div>

<div class="tasks-grid">

<!-- ═══ TASK 1 ═══ -->
<div class="task-card t1">
  <div class="task-card-header">
    <div class="task-num">01</div>
    <div class="task-meta">
      <div class="task-tag">Basic Output Control</div>
      <div class="task-title">Traffic Light LED Control System</div>
      <div class="task-subtitle">3-LED sequence controller simulating road traffic signals</div>
    </div>
    <div class="task-badge">Output Device</div>
  </div>
  <div class="task-body">
    <div class="task-section">
      <div class="sec-label">Components Required</div>
      <div class="comp-list">
        <div class="comp-tag primary">Arduino Uno</div>
        <div class="comp-tag primary">Red LED</div>
        <div class="comp-tag primary">Yellow LED</div>
        <div class="comp-tag primary">Green LED</div>
        <div class="comp-tag">3× 220Ω Resistor</div>
        <div class="comp-tag">Breadboard</div>
        <div class="comp-tag">Jumper Wires</div>
      </div>
      <div style="margin-top:24px">
      <div class="sec-label">Logic Flow</div>
      <div class="flow-steps">
        <div class="flow-step"><div class="flow-n">1</div><div class="flow-t">RED ON → 5 seconds (Stop signal)</div></div>
        <div class="flow-step"><div class="flow-n">2</div><div class="flow-t">YELLOW ON → 2 seconds (Get ready)</div></div>
        <div class="flow-step"><div class="flow-n">3</div><div class="flow-t">GREEN ON → 5 seconds (Go signal)</div></div>
        <div class="flow-step"><div class="flow-n">4</div><div class="flow-t">Loop continuously</div></div>
      </div>
      </div>
    </div>
    <div class="task-section">
      <div class="sec-label">Arduino Code</div>
      <div class="code-block">
<span class="cm">// Task 1: Traffic Light LED Control</span>
<span class="cm">// Author: Joyal Varghese</span>

<span class="kw">int</span> redPin = <span class="val">8</span>;
<span class="kw">int</span> yellowPin = <span class="val">9</span>;
<span class="kw">int</span> greenPin = <span class="val">10</span>;

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(redPin, OUTPUT);
  <span class="fn">pinMode</span>(yellowPin, OUTPUT);
  <span class="fn">pinMode</span>(greenPin, OUTPUT);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="cm">// RED phase — STOP</span>
  <span class="fn">digitalWrite</span>(redPin, HIGH);
  <span class="fn">delay</span>(<span class="val">5000</span>);
  <span class="fn">digitalWrite</span>(redPin, LOW);

  <span class="cm">// YELLOW phase — READY</span>
  <span class="fn">digitalWrite</span>(yellowPin, HIGH);
  <span class="fn">delay</span>(<span class="val">2000</span>);
  <span class="fn">digitalWrite</span>(yellowPin, LOW);

  <span class="cm">// GREEN phase — GO</span>
  <span class="fn">digitalWrite</span>(greenPin, HIGH);
  <span class="fn">delay</span>(<span class="val">5000</span>);
  <span class="fn">digitalWrite</span>(greenPin, LOW);
}
      </div>
    </div>
    <div class="task-section" style="grid-column:1/-1">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:32px">
        <table class="pin-table">
          <tr><th>Component</th><th>Arduino Pin</th><th>Other End</th></tr>
          <tr><td>Red LED +</td><td>Pin 8</td><td>220Ω → GND</td></tr>
          <tr><td>Yellow LED +</td><td>Pin 9</td><td>220Ω → GND</td></tr>
