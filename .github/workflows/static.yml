      <div class="code-block">
<span class="cm">// Task 6: LDR Auto Street Light</span>
<span class="cm">// Author: Joyal Varghese</span>

<span class="kw">int</span> ldrPin = <span class="val">A0</span>;
<span class="kw">int</span> ledPin = <span class="val">9</span>;
<span class="kw">int</span> relayPin = <span class="val">8</span>;
<span class="kw">int</span> ldrValue = <span class="val">0</span>;

<span class="kw">const int</span> DARK_THRESHOLD = <span class="val">300</span>;
<span class="kw">const int</span> BRIGHT_THRESHOLD = <span class="val">600</span>;

<span class="kw">bool</span> lampState = <span class="val">false</span>;

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(ledPin, OUTPUT);
  <span class="fn">pinMode</span>(relayPin, OUTPUT);
  Serial.<span class="fn">begin</span>(<span class="val">9600</span>);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  ldrValue = <span class="fn">analogRead</span>(ldrPin);

  Serial.<span class="fn">print</span>(<span class="str">"LDR: "</span>);
  Serial.<span class="fn">println</span>(ldrValue);

  <span class="cm">// Hysteresis control</span>
  <span class="kw">if</span>(ldrValue &lt; DARK_THRESHOLD) {
    lampState = <span class="val">true</span>;   <span class="cm">// Dark → ON</span>
  } <span class="kw">else if</span>(ldrValue &gt; BRIGHT_THRESHOLD) {
    lampState = <span class="val">false</span>;  <span class="cm">// Bright → OFF</span>
  }

  <span class="fn">digitalWrite</span>(ledPin, lampState ? HIGH : LOW);
  <span class="fn">digitalWrite</span>(relayPin, lampState ? LOW : HIGH);

  <span class="fn">delay</span>(<span class="val">500</span>);
}
