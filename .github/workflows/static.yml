      <div class="sec-label">Arduino Code</div>
      <div class="code-block">
<span class="cm">// Task 7: Temp & Humidity Monitor</span>
<span class="cm">// Author: Joyal Varghese</span>

<span class="kw">#include</span> &lt;<span class="fn">DHT.h</span>&gt;
<span class="kw">#include</span> &lt;<span class="fn">LiquidCrystal.h</span>&gt;

<span class="kw">#define</span> DHTPIN <span class="val">6</span>
<span class="kw">#define</span> DHTTYPE DHT11

DHT <span class="fn">dht</span>(DHTPIN, DHTTYPE);
LiquidCrystal <span class="fn">lcd</span>(<span class="val">12</span>,<span class="val">11</span>,<span class="val">5</span>,<span class="val">4</span>,<span class="val">3</span>,<span class="val">2</span>);

<span class="kw">int</span> alertLED = <span class="val">13</span>;
<span class="kw">int</span> buzzer = <span class="val">9</span>;

<span class="kw">void</span> <span class="fn">setup</span>() {
  dht.<span class="fn">begin</span>();
  lcd.<span class="fn">begin</span>(<span class="val">16</span>, <span class="val">2</span>);
  <span class="fn">pinMode</span>(alertLED, OUTPUT);
  <span class="fn">pinMode</span>(buzzer, OUTPUT);
  Serial.<span class="fn">begin</span>(<span class="val">9600</span>);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="kw">float</span> temp = dht.<span class="fn">readTemperature</span>();
  <span class="kw">float</span> hum  = dht.<span class="fn">readHumidity</span>();

  <span class="kw">if</span>(<span class="fn">isnan</span>(temp) || <span class="fn">isnan</span>(hum)) {
    lcd.<span class="fn">print</span>(<span class="str">"Sensor Error!"</span>);
    <span class="kw">return</span>;
  }

  lcd.<span class="fn">setCursor</span>(<span class="val">0</span>,<span class="val">0</span>);
  lcd.<span class="fn">print</span>(<span class="str">"Temp: "</span>);
  lcd.<span class="fn">print</span>(temp,<span class="val">1</span>); lcd.<span class="fn">print</span>(<span class="str">" C  "</span>);
  lcd.<span class="fn">setCursor</span>(<span class="val">0</span>,<span class="val">1</span>);
  lcd.<span class="fn">print</span>(<span class="str">"Hum:  "</span>);
  lcd.<span class="fn">print</span>(hum,<span class="val">1</span>);  lcd.<span class="fn">print</span>(<span class="str">" %  "</span>);

  <span class="kw">if</span>(temp &gt; <span class="val">35.0</span> || hum &gt; <span class="val">80.0</span>) {
    <span class="fn">digitalWrite</span>(alertLED, HIGH);
    <span class="fn">tone</span>(buzzer, <span class="val">880</span>, <span class="val">500</span>);
  } <span class="kw">else</span> {
    <span class="fn">digitalWrite</span>(alertLED, LOW);
    <span class="fn">noTone</span>(buzzer);
  }
  <span class="fn">delay</span>(<span class="val">2000</span>);
}
