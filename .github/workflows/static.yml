<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Embedded Systems Portfolio — Joyal Varghese</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@200;300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050a0f;
  --surface:#0a1420;
  --card:#0d1a28;
  --border:#1a3a55;
  --cyan:#00d4ff;
  --cyan-dim:#006a80;
  --green:#00ff88;
  --green-dim:#006640;
  --amber:#ffb800;
  --amber-dim:#7a5800;
  --red:#ff3c3c;
  --red-dim:#7a1a1a;
  --blue:#4488ff;
  --purple:#aa44ff;
  --text:#b8d4e8;
  --muted:#3a5a72;
  --white:#e8f4ff;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Exo 2',sans-serif;
  font-weight:300;
  overflow-x:hidden;
}
/* SCANLINE EFFECT */
body::after{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.015) 2px,rgba(0,212,255,0.015) 4px);
  pointer-events:none;z-index:9999;
}
/* HEADER */
header{
  padding:60px 60px 40px;
  border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#050a0f 0%,#0a1420 50%,#050a0f 100%);
}
header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 80% 50%,rgba(0,212,255,0.06),transparent);
}
.header-grid{
  display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center;
  position:relative;z-index:1;
}
.header-tag{
  font-family:'Share Tech Mono',monospace;
  font-size:11px;letter-spacing:3px;color:var(--cyan);
  margin-bottom:12px;
}
.header-title{
  font-family:'Orbitron',monospace;
  font-size:clamp(28px,5vw,52px);font-weight:900;
  color:var(--white);line-height:1.1;
  text-shadow:0 0 40px rgba(0,212,255,0.3);
}
.header-title span{color:var(--cyan);}
.header-sub{
  font-size:14px;color:var(--muted);margin-top:12px;
  font-family:'Share Tech Mono',monospace;letter-spacing:1px;
}
.author-badge{
  background:linear-gradient(135deg,var(--surface),var(--card));
  border:1px solid var(--border);
  padding:24px 32px;text-align:center;
  position:relative;
}
.author-badge::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,212,255,0.05),transparent);
}
.author-badge .label{
  font-size:9px;letter-spacing:4px;text-transform:uppercase;
  color:var(--cyan);font-family:'Share Tech Mono',monospace;
  margin-bottom:8px;
}
.author-badge .name{
  font-family:'Orbitron',monospace;
  font-size:18px;font-weight:700;color:var(--white);
  letter-spacing:1px;
}
.author-badge .id{
  font-size:10px;color:var(--muted);margin-top:6px;
  font-family:'Share Tech Mono',monospace;
}
/* GRID BACKGROUND DOTS */
.dot-grid{
  position:fixed;inset:0;
  background-image:radial-gradient(rgba(0,212,255,0.08) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}
/* MAIN */
main{padding:60px;position:relative;z-index:1;}
.tasks-grid{
  display:grid;grid-template-columns:1fr;gap:40px;
}
/* TASK CARD */
.task-card{
  background:var(--card);
  border:1px solid var(--border);
  position:relative;overflow:hidden;
}
.task-card::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:3px;
  background:var(--accent-color,var(--cyan));
  box-shadow:0 0 20px var(--accent-color,var(--cyan));
}
.task-card-header{
  display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:start;
  padding:32px 36px 24px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,rgba(0,0,0,0.3),transparent);
}
.task-num{
  font-family:'Orbitron',monospace;
  font-size:40px;font-weight:900;
  color:var(--accent-color,var(--cyan));
  opacity:0.25;line-height:1;
}
.task-meta{}
.task-tag{
  font-size:9px;letter-spacing:4px;text-transform:uppercase;
  color:var(--accent-color,var(--cyan));
  font-family:'Share Tech Mono',monospace;margin-bottom:6px;
}
.task-title{
  font-family:'Orbitron',monospace;
  font-size:clamp(16px,2.5vw,22px);font-weight:700;
  color:var(--white);line-height:1.2;
}
.task-subtitle{
  font-size:12px;color:var(--muted);margin-top:4px;
  font-family:'Share Tech Mono',monospace;
}
.task-badge{
  background:rgba(0,0,0,0.4);
  border:1px solid var(--accent-color,var(--cyan));
  padding:6px 14px;
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent-color,var(--cyan));
  font-family:'Share Tech Mono',monospace;
  white-space:nowrap;align-self:center;
}
/* TASK BODY */
.task-body{
  display:grid;grid-template-columns:1fr 1fr;gap:0;
}
.task-section{
  padding:28px 36px;
  border-right:1px solid var(--border);
}
.task-section:last-child{border-right:none;}
.task-section:nth-child(3){border-top:1px solid var(--border);}
.task-section:nth-child(4){border-top:1px solid var(--border);}
.sec-label{
  font-size:8px;letter-spacing:4px;text-transform:uppercase;
  color:var(--muted);font-family:'Share Tech Mono',monospace;
  margin-bottom:14px;display:flex;align-items:center;gap:10px;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}
/* COMPONENTS LIST */
.comp-list{display:flex;flex-wrap:wrap;gap:8px;}
.comp-tag{
  background:rgba(0,0,0,0.5);
  border:1px solid var(--border);
  padding:5px 12px;
  font-size:10px;color:var(--text);
  font-family:'Share Tech Mono',monospace;
  letter-spacing:1px;
}
.comp-tag.primary{
  border-color:var(--accent-color,var(--cyan));
  color:var(--accent-color,var(--cyan));
  background:rgba(0,0,0,0.7);
}
/* DESC */
.task-desc{
  font-size:13px;line-height:1.9;color:var(--text);
}
/* CIRCUIT DIAGRAM AREA */
.circuit-area{
  grid-column:1/-1;
  padding:32px 36px;
  border-top:1px solid var(--border);
  background:rgba(0,0,0,0.2);
}
/* CIRCUIT SVG */
.circuit-svg{
  width:100%;height:auto;
  display:block;
}
/* CODE BLOCK */
.code-block{
  background:#020608;
  border:1px solid var(--border);
  padding:20px;
  font-family:'Share Tech Mono',monospace;
  font-size:11px;line-height:1.8;
  color:#7aaa88;
  overflow-x:auto;
  position:relative;
}
.code-block .ln{color:var(--muted);user-select:none;margin-right:16px;}
.kw{color:var(--cyan);}
.fn{color:var(--amber);}
.cm{color:#3a5a4a;}
.val{color:var(--green);}
.str{color:#ff9a44;}
/* REAL-WORLD BOX */
.rw-box{
  background:rgba(0,0,0,0.3);
  border-left:3px solid var(--accent-color,var(--cyan));
  padding:16px 20px;
  margin-top:14px;
}
.rw-title{
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent-color,var(--cyan));font-family:'Share Tech Mono',monospace;
  margin-bottom:8px;
}
.rw-items{list-style:none;}
.rw-items li{
  font-size:12px;color:var(--muted);padding:3px 0;
  font-family:'Share Tech Mono',monospace;
}
.rw-items li::before{content:'→ ';color:var(--accent-color,var(--cyan));}
/* PIN TABLE */
.pin-table{width:100%;border-collapse:collapse;margin-top:8px;}
.pin-table th{
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);font-family:'Share Tech Mono',monospace;
  text-align:left;padding:8px 12px;
  border-bottom:1px solid var(--border);
}
.pin-table td{
  font-size:11px;color:var(--text);
  font-family:'Share Tech Mono',monospace;
  padding:7px 12px;border-bottom:1px solid rgba(26,58,85,0.4);
}
.pin-table td:first-child{color:var(--accent-color,var(--cyan));}
/* FLOW BOX */
.flow-steps{display:flex;flex-direction:column;gap:0;}
.flow-step{
  display:flex;align-items:flex-start;gap:14px;
  padding:10px 0;border-bottom:1px solid rgba(26,58,85,0.3);
}
.flow-step:last-child{border-bottom:none;}
.flow-n{
  width:24px;height:24px;
  background:var(--accent-color,var(--cyan));
  color:#000;
  font-family:'Orbitron',monospace;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.flow-t{font-size:12px;color:var(--text);line-height:1.6;}
/* FOOTER */
footer{
  padding:40px 60px;
  border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  background:var(--surface);
  position:relative;z-index:1;
}
.footer-name{
  font-family:'Orbitron',monospace;
  font-size:14px;color:var(--cyan);font-weight:700;
}
.footer-meta{
  font-family:'Share Tech Mono',monospace;
  font-size:10px;color:var(--muted);letter-spacing:2px;
}

/* TASK ACCENT COLORS */
.t1{--accent-color:#00ff88;}
.t2{--accent-color:#00d4ff;}
.t3{--accent-color:#ffb800;}
.t4{--accent-color:#ff3c3c;}
.t5{--accent-color:#4488ff;}
.t6{--accent-color:#aa44ff;}
.t7{--accent-color:#ff6644;}

@media(max-width:900px){
  header{padding:40px 24px 30px;}
  .header-grid{grid-template-columns:1fr;}
  main{padding:30px 24px;}
  .task-body{grid-template-columns:1fr;}
  .task-section{border-right:none;border-top:1px solid var(--border);}
  .task-section:first-child{border-top:none;}
  .task-card-header{grid-template-columns:auto 1fr;}
  .task-badge{display:none;}
  footer{flex-direction:column;gap:12px;padding:30px 24px;}
}
</style>
</head>
<body>
<div class="dot-grid"></div>

<!-- HEADER -->
<header>
  <div class="header-grid">
    <div>
      <div class="header-tag">// EMBEDDED SYSTEMS DESIGN — 7 TASK PORTFOLIO</div>
      <h1 class="header-title">Output &amp; Control<br/><span>Systems Lab</span></h1>
      <p class="header-sub">Arduino / Microcontroller Projects · Practical Circuit Design</p>
    </div>
    <div class="author-badge">
      <div class="label">Created By</div>
      <div class="name">JOYAL VARGHESE</div>
      <div class="id">// SYSTEMS DESIGN PORTFOLIO</div>
    </div>
  </div>
</header>

<main>
<div class="tasks-grid">

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- TASK 1 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="task-card t1">
  <div class="task-card-header">
    <div class="task-num">01</div>
    <div class="task-meta">
      <div class="task-tag">Basic Output Control</div>
      <div class="task-title">Traffic Light LED Control System</div>
      <div class="task-subtitle">3-LED sequence controller simulating road traffic signals</div>
    </div>
    <div class="task-badge">OUTPUT DEVICE</div>
  </div>
  <div class="task-body">
    <div class="task-section">
      <div class="sec-label">Components Required</div>
      <div class="comp-list">
        <div class="comp-tag primary">Arduino Uno</div>
        <div class="comp-tag primary">Red LED</div>
        <div class="comp-tag primary">Yellow LED</div>
        <div class="comp-tag primary">Green LED</div>
        <div class="comp-tag">3× 220Ω Resistor</div>
        <div class="comp-tag">Breadboard</div>
        <div class="comp-tag">Jumper Wires</div>
      </div>
      <div style="margin-top:20px">
      <div class="sec-label">Logic Flow</div>
      <div class="flow-steps">
        <div class="flow-step"><div class="flow-n">1</div><div class="flow-t">RED ON → 5 seconds (Stop signal)</div></div>
        <div class="flow-step"><div class="flow-n">2</div><div class="flow-t">YELLOW ON → 2 seconds (Get ready)</div></div>
        <div class="flow-step"><div class="flow-n">3</div><div class="flow-t">GREEN ON → 5 seconds (Go signal)</div></div>
        <div class="flow-step"><div class="flow-n">4</div><div class="flow-t">Loop continuously</div></div>
      </div>
      </div>
    </div>
    <div class="task-section">
      <div class="sec-label">Arduino Code</div>
      <div class="code-block">
<span class="cm">// Task 1: Traffic Light LED Control</span>
<span class="cm">// Author: Joyal Varghese</span>

<span class="kw">int</span> redPin = <span class="val">8</span>;
<span class="kw">int</span> yellowPin = <span class="val">9</span>;
<span class="kw">int</span> greenPin = <span class="val">10</span>;

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(redPin, OUTPUT);
  <span class="fn">pinMode</span>(yellowPin, OUTPUT);
  <span class="fn">pinMode</span>(greenPin, OUTPUT);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="cm">// RED phase — STOP</span>
  <span class="fn">digitalWrite</span>(redPin, HIGH);
  <span class="fn">delay</span>(<span class="val">5000</span>);
  <span class="fn">digitalWrite</span>(redPin, LOW);

  <span class="cm">// YELLOW phase — READY</span>
  <span class="fn">digitalWrite</span>(yellowPin, HIGH);
  <span class="fn">delay</span>(<span class="val">2000</span>);
  <span class="fn">digitalWrite</span>(yellowPin, LOW);

  <span class="cm">// GREEN phase — GO</span>
  <span class="fn">digitalWrite</span>(greenPin, HIGH);
  <span class="fn">delay</span>(<span class="val">5000</span>);
  <span class="fn">digitalWrite</span>(greenPin, LOW);
}
      </div>
    </div>
    <div class="task-section" style="grid-column:1/-1">
      <div class="sec-label">Pin Connections</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <table class="pin-table">
          <tr><th>Component</th><th>Arduino Pin</th><th>Other End</th></tr>
          <tr><td>Red LED +</td><td>Pin 8</td><td>220Ω → GND</td></tr>
          <tr><td>Yellow LED +</td><td>Pin 9</td><td>220Ω → GND</td></tr>
          <tr><td>Green LED +</td><td>Pin 10</td><td>220Ω → GND</td></tr>
        </table>
        <div class="rw-box">
          <div class="rw-title">Real-World Applications</div>
          <ul class="rw-items">
            <li>Road traffic intersections</li>
            <li>Factory assembly line signals</li>
            <li>Pedestrian crossing lights</li>
            <li>Railway level crossing gates</li>
            <li>Airport runway indicators</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- TASK 2 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="task-card t2">
  <div class="task-card-header">
    <div class="task-num">02</div>
    <div class="task-meta">
      <div class="task-tag">Variable Control System</div>
      <div class="task-title">PWM LED Brightness Fade Controller</div>
      <div class="task-subtitle">Smooth brightness variation using Pulse Width Modulation</div>
    </div>
    <div class="task-badge">PWM CONTROL</div>
  </div>
  <div class="task-body">
    <div class="task-section">
      <div class="sec-label">Components Required</div>
      <div class="comp-list">
        <div class="comp-tag primary">Arduino Uno</div>
        <div class="comp-tag primary">White LED (or RGB)</div>
        <div class="comp-tag primary">10kΩ Potentiometer</div>
        <div class="comp-tag">220Ω Resistor</div>
        <div class="comp-tag">Breadboard</div>
        <div class="comp-tag">Jumper Wires</div>
      </div>
      <div style="margin-top:20px">
      <div class="sec-label">System Description</div>
      <p class="task-desc">A potentiometer rotates from 0° to 270°. The analog reading (0–1023) is mapped to a PWM duty cycle (0–255) and sent to the LED pin. This creates a smooth, continuous dimming effect — mimicking professional smart lighting systems.</p>
      </div>
    </div>
    <div class="task-section">
      <div class="sec-label">Arduino Code</div>
      <div class="code-block">
<span class="cm">// Task 2: PWM Brightness Control</span>
<span class="cm">// Author: Joyal Varghese</span>

<span class="kw">int</span> potPin = <span class="val">A0</span>;   <span class="cm">// Potentiometer input</span>
<span class="kw">int</span> ledPin = <span class="val">9</span>;    <span class="cm">// PWM pin (~)</span>
<span class="kw">int</span> potValue = <span class="val">0</span>;
<span class="kw">int</span> brightness = <span class="val">0</span>;

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(ledPin, OUTPUT);
  Serial.<span class="fn">begin</span>(<span class="val">9600</span>);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  potValue = <span class="fn">analogRead</span>(potPin);

  <span class="cm">// Map 0-1023 → 0-255 (PWM range)</span>
  brightness = <span class="fn">map</span>(potValue, <span class="val">0</span>, <span class="val">1023</span>, <span class="val">0</span>, <span class="val">255</span>);

  <span class="fn">analogWrite</span>(ledPin, brightness);

  Serial.<span class="fn">print</span>(<span class="str">"Brightness: "</span>);
  Serial.<span class="fn">println</span>(brightness);
  <span class="fn">delay</span>(<span class="val">10</span>);
}
      </div>
    </div>
    <div class="task-section" style="grid-column:1/-1">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <table class="pin-table">
          <tr><th>Component</th><th>Arduino Pin</th><th>Notes</th></tr>
          <tr><td>Potentiometer Wiper</td><td>A0</td><td>Analog Input</td></tr>
          <tr><td>Pot VCC</td><td>5V</td><td>Power rail</td></tr>
          <tr><td>Pot GND</td><td>GND</td><td>Ground rail</td></tr>
          <tr><td>LED Anode</td><td>Pin 9 (~)</td><td>PWM capable</td></tr>
          <tr><td>LED Cathode</td><td>GND</td><td>via 220Ω</td></tr>
        </table>
        <div class="rw-box">
          <div class="rw-title">Real-World Applications</div>
          <ul class="rw-items">
            <li>Smart home dimmer switches</li>
            <li>Operating theatre lighting</li>
            <li>Automotive dashboard backlight</li>
            <li>Studio/photography lighting rigs</li>
            <li>Energy-saving office lighting</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- TASK 3 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="task-card t3">
  <div class="task-card-header">
    <div class="task-num">03</div>
    <div class="task-meta">
      <div class="task-tag">User Interaction System</div>
      <div class="task-title">Push-Button LED Toggle with Debounce</div>
      <div class="task-subtitle">Manual override control via tactile switch input</div>
    </div>
    <div class="task-badge">INPUT CONTROL</div>
  </div>
  <div class="task-body">
    <div class="task-section">
      <div class="sec-label">Components Required</div>
      <div class="comp-list">
        <div class="comp-tag primary">Arduino Uno</div>
        <div class="comp-tag primary">Push Button × 2</div>
        <div class="comp-tag primary">LED (Red + Green)</div>
        <div class="comp-tag">10kΩ Resistor × 2</div>
        <div class="comp-tag">220Ω Resistor × 2</div>
        <div class="comp-tag">Breadboard</div>
      </div>
      <div style="margin-top:20px">
      <div class="sec-label">Logic Flow</div>
      <div class="flow-steps">
        <div class="flow-step"><div class="flow-n">1</div><div class="flow-t">Button A pressed → Green LED ON, Red OFF</div></div>
        <div class="flow-step"><div class="flow-n">2</div><div class="flow-t">Button B pressed → Red LED ON, Green OFF</div></div>
        <div class="flow-step"><div class="flow-n">3</div><div class="flow-t">Debounce delay prevents false triggers</div></div>
        <div class="flow-step"><div class="flow-n">4</div><div class="flow-t">State held until next button press</div></div>
      </div>
      </div>
    </div>
    <div class="task-section">
      <div class="sec-label">Arduino Code</div>
      <div class="code-block">
<span class="cm">// Task 3: Button-Controlled LED Toggle</span>
<span class="cm">// Author: Joyal Varghese</span>

<span class="kw">const int</span> btnA = <span class="val">2</span>;
<span class="kw">const int</span> btnB = <span class="val">3</span>;
<span class="kw">const int</span> greenLED = <span class="val">10</span>;
<span class="kw">const int</span> redLED = <span class="val">11</span>;
<span class="kw">const int</span> debounceDelay = <span class="val">50</span>;

<span class="kw">int</span> lastStateA = HIGH;
<span class="kw">int</span> lastStateB = HIGH;

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(btnA, INPUT_PULLUP);
  <span class="fn">pinMode</span>(btnB, INPUT_PULLUP);
  <span class="fn">pinMode</span>(greenLED, OUTPUT);
  <span class="fn">pinMode</span>(redLED, OUTPUT);
  <span class="cm">// Default state: Red ON</span>
  <span class="fn">digitalWrite</span>(redLED, HIGH);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  <span class="kw">int</span> readA = <span class="fn">digitalRead</span>(btnA);
  <span class="kw">int</span> readB = <span class="fn">digitalRead</span>(btnB);

  <span class="kw">if</span>(readA == LOW && lastStateA == HIGH) {
    <span class="fn">digitalWrite</span>(greenLED, HIGH);
    <span class="fn">digitalWrite</span>(redLED, LOW);
    <span class="fn">delay</span>(debounceDelay);
  }
  <span class="kw">if</span>(readB == LOW && lastStateB == HIGH) {
    <span class="fn">digitalWrite</span>(redLED, HIGH);
    <span class="fn">digitalWrite</span>(greenLED, LOW);
    <span class="fn">delay</span>(debounceDelay);
  }
  lastStateA = readA;
  lastStateB = readB;
}
