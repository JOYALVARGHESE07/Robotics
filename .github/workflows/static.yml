    <div class="task-r">
      <div>
        <div class="pane-label">Arduino Code</div>
        <div class="code"><span class="c">// Task 3: Button-Controlled LED Toggle
// Author: Joyal Varghese</span>

<span class="k">const int</span> btnA      = <span class="v">2</span>;
<span class="k">const int</span> btnB      = <span class="v">3</span>;
<span class="k">const int</span> greenLED  = <span class="v">10</span>;
<span class="k">const int</span> redLED    = <span class="v">11</span>;
<span class="k">int</span> lastA = HIGH, lastB = HIGH;

<span class="k">void</span> <span class="f">setup</span>() {
  <span class="f">pinMode</span>(btnA,     INPUT_PULLUP);
  <span class="f">pinMode</span>(btnB,     INPUT_PULLUP);
  <span class="f">pinMode</span>(greenLED, OUTPUT);
  <span class="f">pinMode</span>(redLED,   OUTPUT);
  <span class="f">digitalWrite</span>(redLED, HIGH); <span class="c">// default ON</span>
}

<span class="k">void</span> <span class="f">loop</span>() {
  <span class="k">int</span> rA = <span class="f">digitalRead</span>(btnA);
  <span class="k">int</span> rB = <span class="f">digitalRead</span>(btnB);

  <span class="k">if</span>(rA == LOW && lastA == HIGH) {
    <span class="f">digitalWrite</span>(greenLED, HIGH);
    <span class="f">digitalWrite</span>(redLED,   LOW);
    <span class="f">delay</span>(<span class="v">50</span>); <span class="c">// debounce</span>
  }
  <span class="k">if</span>(rB == LOW && lastB == HIGH) {
    <span class="f">digitalWrite</span>(redLED,   HIGH);
    <span class="f">digitalWrite</span>(greenLED, LOW);
    <span class="f">delay</span>(<span class="v">50</span>);
  }
  lastA = rA;  lastB = rB;
}</div>
