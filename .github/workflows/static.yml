<span class="cm">// Task 5: LCD Information Display</span>
<span class="cm">// Author: Joyal Varghese</span>

<span class="kw">#include</span> &lt;<span class="fn">LiquidCrystal.h</span>&gt;

LiquidCrystal <span class="fn">lcd</span>(<span class="val">12</span>,<span class="val">11</span>,<span class="val">5</span>,<span class="val">4</span>,<span class="val">3</span>,<span class="val">2</span>);

<span class="kw">int</span> potPin = <span class="val">A0</span>;
<span class="kw">int</span> potValue;
<span class="kw">float</span> voltage;

<span class="kw">void</span> <span class="fn">setup</span>() {
  lcd.<span class="fn">begin</span>(<span class="val">16</span>, <span class="val">2</span>);
  lcd.<span class="fn">print</span>(<span class="str">"SYSTEM STATUS"</span>);
  <span class="fn">delay</span>(<span class="val">1500</span>);
