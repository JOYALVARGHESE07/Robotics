  <span class="f">analogWrite</span>(ledPin, brightness);

  Serial.<span class="f">print</span>(<span class="s">"Brightness: "</span>);
  Serial.<span class="f">println</span>(brightness);
  <span class="f">delay</span>(<span class="v">10</span>);
}</div>
