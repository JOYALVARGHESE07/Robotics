      <div>
        <div class="pane-label">Arduino Code</div>
        <div class="code"><span class="c">// Task 4: PIR Motion Alarm
// Author: Joyal Varghese</span>

<span class="k">int</span> pirPin    = <span class="v">7</span>;
<span class="k">int</span> buzzerPin = <span class="v">8</span>;
<span class="k">int</span> ledPin    = <span class="v">13</span>;

<span class="k">void</span> <span class="f">setup</span>() {
  <span class="f">pinMode</span>(pirPin,    INPUT);
  <span class="f">pinMode</span>(buzzerPin, OUTPUT);
  <span class="f">pinMode</span>(ledPin,    OUTPUT);
  Serial.<span class="f">begin</span>(<span class="v">9600</span>);
}

<span class="k">void</span> <span class="f">triggerAlarm</span>() {
  <span class="k">for</span>(<span class="k">int</span> i = <span class="v">0</span>; i < <span class="v">3</span>; i++) {
    <span class="f">tone</span>(buzzerPin, <span class="v">1000</span>);
    <span class="f">digitalWrite</span>(ledPin, HIGH);
    <span class="f">delay</span>(<span class="v">300</span>);
    <span class="f">noTone</span>(buzzerPin);
    <span class="f">digitalWrite</span>(ledPin, LOW);
    <span class="f">delay</span>(<span class="v">200</span>);
  }
}

<span class="k">void</span> <span class="f">loop</span>() {
  <span class="k">if</span>(<span class="f">digitalRead</span>(pirPin) == HIGH) {
    Serial.<span class="f">println</span>(<span class="s">"MOTION DETECTED"</span>);
    <span class="f">triggerAlarm</span>();
    <span class="f">delay</span>(<span class="v">2000</span>);
  }
}</div>
