<span class="cm">// Task 2: PWM Brightness Control</span>
<span class="cm">// Author: Joyal Varghese</span>

<span class="kw">int</span> potPin = <span class="val">A0</span>;
<span class="kw">int</span> ledPin = <span class="val">9</span>;
<span class="kw">int</span> potValue = <span class="val">0</span>;
<span class="kw">int</span> brightness = <span class="val">0</span>;

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(ledPin, OUTPUT);
  Serial.<span class="fn">begin</span>(<span class="val">9600</span>);
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  potValue = <span class="fn">analogRead</span>(potPin);
  brightness = <span class="fn">map</span>(potValue, <span class="val">0</span>, <span class="val">1023</span>, <span class="val">0</span>, <span class="val">255</span>);
  <span class="fn">analogWrite</span>(ledPin, brightness);
  Serial.<span class="fn">print</span>(<span class="str">"Brightness: "</span>);
  Serial.<span class="fn">println</span>(brightness);
  <span class="fn">delay</span>(<span class="val">10</span>);
}
