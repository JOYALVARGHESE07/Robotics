<script>
/* CURSOR */
const cur = document.getElementById('cur');
const ring = document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function lerp(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(lerp);})();
document.querySelectorAll('a,button,.task,.a-badge,.chip').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('hover'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('hover'));
});

/* LOADER */
window.addEventListener('load',()=>{
  setTimeout(()=>{document.getElementById('loader').classList.add('gone');},2200);
});

/* NAV STUCK */
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>nav.classList.toggle('stuck',scrollY>60));

/* SCROLL REVEAL */
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');});
},{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
