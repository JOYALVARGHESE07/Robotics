          <tr><td>Alert LED</td><td>Pin 13</td><td>220Ω to GND</td></tr>
          <tr><td>Buzzer +</td><td>Pin 9</td><td>tone() function</td></tr>
          <tr><td>LCD RS–D7</td><td>12,11,5,4,3,2</td><td>4-bit mode</td></tr>
        </table>
      </div>
