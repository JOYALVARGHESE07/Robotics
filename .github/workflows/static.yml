<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Joyal Varghese — Systems Design Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Josefin+Sans:wght@100;200;300;400&display=swap" rel="stylesheet"/>
<style>
/* ─────────────────────────────────────────
   RESET & ROOT
───────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --ink:    #0c0c0c;
  --deep:   #111111;
  --panel:  #161616;
  --lift:   #1e1e1e;
  --line:   rgba(255,255,255,0.07);
  --gold:   #c9a84c;
  --gold2:  #e8cc80;
  --gold3:  #8a6820;
  --silver: #a8b4c0;
  --fog:    rgba(255,255,255,0.04);
  --text:   #d8cfc4;
  --muted:  #6a6058;
  --white:  #f4f0ea;
}

html { scroll-behavior:smooth; }

body {
  background: var(--ink);
  color: var(--text);
  font-family: 'Josefin Sans', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
  cursor: none;
}

/* ─────────────────────────────────────────
   CUSTOM CURSOR
───────────────────────────────────────── */
#cur {
  position:fixed; width:8px; height:8px;
  background:var(--gold); border-radius:50%;
  pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .25s,height .25s,opacity .25s;
}
#cur-ring {
  position:fixed; width:32px; height:32px;
  border:1px solid rgba(201,168,76,.45); border-radius:50%;
  pointer-events:none; z-index:9998;
  transform:translate(-50%,-50%);
  transition:width .3s,height .3s,border-color .3s;
}
body.hover #cur { width:14px; height:14px; }
body.hover #cur-ring { width:48px; height:48px; border-color:rgba(201,168,76,.9); }

/* ─────────────────────────────────────────
   LOADER
───────────────────────────────────────── */
#loader {
  position:fixed; inset:0; background:var(--ink); z-index:9000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity .8s ease, visibility .8s ease;
}
#loader.gone { opacity:0; visibility:hidden; }
.loader-name {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(28px,4vw,48px); font-weight:300;
  color:var(--white); letter-spacing:10px;
  opacity:0; animation:fadeUp .9s ease .4s forwards;
}
.loader-bar-wrap {
  margin-top:32px; width:180px; height:1px; background:rgba(255,255,255,0.08);
  overflow:hidden;
}
.loader-bar {
  height:100%; background:var(--gold);
  width:0; animation:barFill 1.8s ease .6s forwards;
}
.loader-pct {
  margin-top:14px; font-size:10px; letter-spacing:5px; color:var(--muted);
  animation:fadeUp .6s ease .8s forwards; opacity:0;
}
@keyframes barFill { to { width:100%; } }
@keyframes fadeUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }

/* ─────────────────────────────────────────
   NAV
───────────────────────────────────────── */
nav {
  position:fixed; top:0; left:0; right:0; z-index:500;
  display:flex; align-items:center; justify-content:space-between;
  padding:30px 60px;
  transition:padding .5s,background .5s,border-color .5s;
  border-bottom:1px solid transparent;
}
nav.stuck {
  padding:18px 60px;
  background:rgba(12,12,12,.96);
  border-color:var(--line);
  backdrop-filter:blur(12px);
}
.nav-logo {
  font-family:'Cormorant Garamond',serif;
  font-size:20px; font-weight:300; letter-spacing:6px;
  color:var(--gold); text-decoration:none; white-space:nowrap;
}
.nav-links { display:flex; gap:40px; list-style:none; }
.nav-links a {
  font-size:9px; letter-spacing:3.5px; text-transform:uppercase;
  color:rgba(212,200,188,.6); text-decoration:none;
  transition:color .3s; position:relative; padding-bottom:4px;
}
.nav-links a::after {
  content:''; position:absolute; bottom:0; left:0; width:0; height:1px;
  background:var(--gold); transition:width .4s ease;
}
.nav-links a:hover { color:var(--white); }
.nav-links a:hover::after { width:100%; }
.nav-end {
  font-size:9px; letter-spacing:3px; text-transform:uppercase;
  color:var(--ink); background:var(--gold);
  padding:10px 22px; text-decoration:none;
  transition:background .3s, transform .2s;
}
.nav-end:hover { background:var(--gold2); transform:translateY(-1px); }

/* ─────────────────────────────────────────
   HERO
───────────────────────────────────────── */
.hero {
  height:100vh; min-height:680px;
  display:flex; flex-direction:column;
  align-items:flex-start; justify-content:flex-end;
  padding:0 60px 80px;
  position:relative; overflow:hidden;
}
.hero-canvas {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 55% 70% at 70% 40%, rgba(201,168,76,.07) 0%, transparent 65%),
    radial-gradient(ellipse 30% 40% at 20% 70%, rgba(201,168,76,.04) 0%, transparent 60%),
    linear-gradient(160deg, #0e0e0e 0%, #0c0c0c 100%);
}
/* Animated diagonal lines */
.hero-lines {
  position:absolute; inset:0; overflow:hidden; pointer-events:none;
}
.hero-lines::before {
  content:'';
  position:absolute; top:-50%; left:60%; width:1px; height:200%;
  background:linear-gradient(to bottom, transparent, rgba(201,168,76,.12), transparent);
  transform:rotate(-15deg);
  animation:lineDrift 12s ease-in-out infinite alternate;
}
.hero-lines::after {
  content:'';
  position:absolute; top:-50%; left:72%; width:1px; height:200%;
  background:linear-gradient(to bottom, transparent, rgba(201,168,76,.07), transparent);
  transform:rotate(-15deg);
  animation:lineDrift 18s ease-in-out infinite alternate-reverse;
}
@keyframes lineDrift { from{transform:rotate(-15deg) translateX(0)} to{transform:rotate(-15deg) translateX(40px)} }

.hero-tag {
  font-size:9px; letter-spacing:5px; text-transform:uppercase;
  color:var(--gold); position:relative; z-index:1;
  opacity:0; animation:fadeUp .8s ease 2s forwards;
  display:flex; align-items:center; gap:14px; margin-bottom:20px;
}
.hero-tag::before { content:''; width:40px; height:1px; background:var(--gold); }

.hero-h1 {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(60px,9vw,120px); font-weight:300; line-height:.95;
  color:var(--white); letter-spacing:-2px; position:relative; z-index:1;
  opacity:0; animation:fadeUp 1s ease 2.2s forwards;
}
.hero-h1 em { font-style:italic; color:var(--gold2); }

.hero-desc {
  max-width:480px; font-size:13px; line-height:2;
  color:var(--muted); margin-top:28px; position:relative; z-index:1;
  opacity:0; animation:fadeUp .9s ease 2.5s forwards;
}

.hero-btns {
  display:flex; gap:16px; margin-top:40px; position:relative; z-index:1;
  opacity:0; animation:fadeUp .8s ease 2.7s forwards;
}
.btn-a {
  font-size:9px; letter-spacing:3.5px; text-transform:uppercase;
  padding:14px 36px; background:var(--gold); color:var(--ink);
  text-decoration:none; font-weight:400;
  transition:background .3s,transform .25s,box-shadow .3s;
}
.btn-a:hover { background:var(--gold2); transform:translateY(-2px); box-shadow:0 16px 40px rgba(201,168,76,.25); }
.btn-b {
  font-size:9px; letter-spacing:3.5px; text-transform:uppercase;
  padding:14px 36px; border:1px solid rgba(201,168,76,.35); color:var(--gold);
  text-decoration:none;
  transition:border-color .3s,background .3s,transform .25s;
}
.btn-b:hover { border-color:var(--gold); background:rgba(201,168,76,.06); transform:translateY(-2px); }

/* hero scroll indicator */
.hero-scroll {
  position:absolute; bottom:48px; right:60px; z-index:2;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  opacity:0; animation:fadeUp .7s ease 3s forwards;
}
.hero-scroll span {
  font-size:8px; letter-spacing:4px; text-transform:uppercase; color:var(--muted);
  writing-mode:vertical-rl;
}
.scroll-line {
  width:1px; height:60px;
  background:linear-gradient(to bottom, var(--gold), transparent);
  animation:scrollPulse 2.2s ease-in-out infinite;
}
@keyframes scrollPulse { 0%,100%{opacity:.3;transform:scaleY(1)} 50%{opacity:1;transform:scaleY(1.15)} }

/* ─────────────────────────────────────────
   TICKER
───────────────────────────────────────── */
.ticker {
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
  padding:16px 0; overflow:hidden;
  background:rgba(201,168,76,.025);
}
.ticker-track {
  display:flex; white-space:nowrap;
  animation:tickerRoll 36s linear infinite;
}
.ticker-track span {
  font-size:9px; letter-spacing:5px; text-transform:uppercase;
  color:var(--muted); padding:0 44px;
}
.ticker-track span.g { color:var(--gold); font-weight:400; }
@keyframes tickerRoll { from{transform:translateX(0)} to{transform:translateX(-50%)} }

/* ─────────────────────────────────────────
   SECTION COMMON
───────────────────────────────────────── */
.s-label {
  font-size:8px; letter-spacing:5px; text-transform:uppercase;
  color:var(--gold); display:flex; align-items:center; gap:14px;
}
.s-label::after { content:''; flex:1; max-width:40px; height:1px; background:var(--gold); }
.s-title {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(36px,5vw,66px); font-weight:300; line-height:1.05;
  color:var(--white);
}
.s-title em { font-style:italic; color:var(--gold2); }

/* ─────────────────────────────────────────
   TASKS INTRO
───────────────────────────────────────── */
.intro {
  padding:120px 60px 80px;
  display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center;
}
.intro-right p {
  font-size:14px; line-height:2.1; color:var(--muted);
  margin-top:24px;
}
.intro-stat-row {
  display:grid; grid-template-columns:repeat(3,1fr); gap:32px; margin-top:48px;
  padding-top:40px; border-top:1px solid var(--line);
}
.istat-n {
  font-family:'Cormorant Garamond',serif;
  font-size:52px; font-weight:300; color:var(--gold2); line-height:1;
}
.istat-l { font-size:9px; letter-spacing:3px; color:var(--muted); margin-top:8px; }

/* ─────────────────────────────────────────
   TASKS SECTION
───────────────────────────────────────── */
.tasks { padding:0 0 120px; }

/* Index header */
.tasks-header {
  padding:0 60px 60px;
  display:flex; justify-content:space-between; align-items:flex-end;
}

/* Each task as a full-bleed panel */
.task {
  border-top:1px solid var(--line);
  display:grid; grid-template-columns:1fr 1fr;
  min-height:520px;
  transition:background .4s;
}
.task:hover { background:rgba(255,255,255,.012); }

/* LEFT pane */
.task-l {
  padding:64px 60px;
  display:flex; flex-direction:column; justify-content:space-between;
  border-right:1px solid var(--line);
  position:relative;
}
.task-num-bg {
  position:absolute; top:30px; right:36px;
  font-family:'Cormorant Garamond',serif;
  font-size:120px; font-weight:300; line-height:1;
  color:rgba(201,168,76,.06); pointer-events:none; select:none;
}
.task-index {
  font-size:8px; letter-spacing:5px; color:var(--gold); text-transform:uppercase;
}
.task-title {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(28px,3.5vw,44px); font-weight:300; line-height:1.15;
  color:var(--white); margin:16px 0 10px;
}
.task-title em { font-style:italic; color:var(--gold2); }
.task-sub {
  font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase;
}
.task-desc {
  font-size:13px; line-height:2; color:var(--muted); margin:28px 0;
  max-width:400px;
}
.task-chips { display:flex; flex-wrap:wrap; gap:8px; }
.chip {
  font-size:9px; letter-spacing:2px; text-transform:uppercase;
  padding:6px 14px; border:1px solid var(--line); color:var(--muted);
}
.chip.hi {
  border-color:rgba(201,168,76,.4); color:var(--gold);
}
/* flow steps */
.flow { display:flex; flex-direction:column; gap:0; margin-top:28px; }
.flow-item {
  display:flex; gap:20px; align-items:flex-start;
  padding:14px 0; border-bottom:1px solid var(--line);
}
.flow-item:last-child { border-bottom:none; }
.flow-n {
  font-family:'Cormorant Garamond',serif;
  font-size:28px; font-weight:300; color:rgba(201,168,76,.3); line-height:1;
  min-width:32px;
  transition:color .3s;
}
.task:hover .flow-n { color:rgba(201,168,76,.7); }
.flow-t { font-size:12px; line-height:1.8; color:var(--muted); padding-top:4px; }
.flow-t strong { color:var(--text); font-weight:400; }

/* RIGHT pane */
.task-r {
  padding:64px 60px;
  display:flex; flex-direction:column; gap:32px;
}
.pane-label {
  font-size:8px; letter-spacing:4px; text-transform:uppercase;
  color:var(--muted); margin-bottom:12px;
  display:flex; align-items:center; gap:12px;
}
.pane-label::after { content:''; flex:1; height:1px; background:var(--line); }

/* CODE */
.code {
  background:#080c0e;
  border:1px solid rgba(201,168,76,.1);
  padding:24px 28px;
  font-family:'Courier New',Courier,monospace;
  font-size:11.5px; line-height:1.85;
  overflow-x:auto; position:relative;
  max-height:320px; overflow-y:auto;
}
.code::-webkit-scrollbar { width:4px; height:4px; }
.code::-webkit-scrollbar-track { background:transparent; }
.code::-webkit-scrollbar-thumb { background:var(--gold3); }
.code .c  { color:#3e5a48; }
.code .k  { color:#7aaecc; }
.code .f  { color:#d4a060; }
.code .v  { color:#88cc88; }
.code .s  { color:#cc8866; }
.code .p  { color:#8899aa; }

/* PIN TABLE */
.ptable { width:100%; border-collapse:collapse; }
.ptable th {
  font-size:8px; letter-spacing:3px; text-transform:uppercase;
  color:var(--muted); text-align:left;
  padding:10px 16px; border-bottom:1px solid var(--line);
}
.ptable td {
  font-size:11px; color:var(--text);
  padding:9px 16px; border-bottom:1px solid rgba(255,255,255,.03);
  font-family:'Courier New',monospace;
}
.ptable td:first-child { color:var(--gold); }

/* REAL WORLD */
.rw {
  border-left:2px solid var(--gold3); padding-left:20px;
}
.rw-label { font-size:8px; letter-spacing:4px; text-transform:uppercase; color:var(--gold3); margin-bottom:10px; }
.rw ul { list-style:none; }
.rw li { font-size:12px; color:var(--muted); padding:4px 0; }
.rw li::before { content:'— '; color:var(--gold3); }

/* ─────────────────────────────────────────
   ACCENT STRIPE per task
───────────────────────────────────────── */
.t1 .task-l { border-top:2px solid #88cc88; }
.t2 .task-l { border-top:2px solid var(--gold); }
.t3 .task-l { border-top:2px solid #ffb84d; }
.t4 .task-l { border-top:2px solid #cc4444; }
.t5 .task-l { border-top:2px solid #5599dd; }
.t6 .task-l { border-top:2px solid #aa66cc; }
.t7 .task-l { border-top:2px solid #44aabb; }

/* ─────────────────────────────────────────
   AUTHOR SECTION
───────────────────────────────────────── */
.author-section {
  padding:120px 60px;
  display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center;
  border-top:1px solid var(--line);
  background:var(--panel);
}
.author-visual {
  aspect-ratio:1; max-width:460px; position:relative;
  display:flex; align-items:center; justify-content:center;
}
.author-ring {
  position:absolute; border-radius:50%; border:1px solid rgba(201,168,76,.12);
}
.author-ring:nth-child(1) { width:88%; height:88%; animation:ringBreath 7s ease-in-out infinite; }
.author-ring:nth-child(2) { width:70%; height:70%; animation:ringBreath 9s ease-in-out infinite reverse; border-style:dashed; border-color:rgba(201,168,76,.07); }
.author-ring:nth-child(3) { width:50%; height:50%; animation:ringBreath 11s ease-in-out infinite; }
@keyframes ringBreath { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
.author-center {
  text-align:center; z-index:1;
}
.a-name {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(28px,4vw,52px); font-weight:300;
  color:var(--white); letter-spacing:4px; line-height:1.15;
}
.a-name span { color:var(--gold); }
.a-line { width:60px; height:1px; background:var(--gold); margin:18px auto; }
.a-role { font-size:9px; letter-spacing:5px; text-transform:uppercase; color:var(--muted); }

.author-content .s-label { margin-bottom:20px; }
.author-content .s-title { margin-bottom:28px; }
.author-content p { font-size:13px; line-height:2.1; color:var(--muted); }
.author-badges {
  display:flex; flex-wrap:wrap; gap:10px; margin-top:36px;
}
.a-badge {
  font-size:9px; letter-spacing:3px; text-transform:uppercase;
  padding:8px 18px; border:1px solid var(--line); color:var(--muted);
  transition:border-color .3s,color .3s;
}
.a-badge:hover { border-color:rgba(201,168,76,.5); color:var(--gold); }

/* ─────────────────────────────────────────
   FOOTER
───────────────────────────────────────── */
footer {
  padding:60px; border-top:1px solid var(--line);
  display:flex; justify-content:space-between; align-items:center;
  background:var(--ink);
}
.foot-logo {
  font-family:'Cormorant Garamond',serif;
  font-size:18px; font-weight:300; letter-spacing:6px; color:var(--gold);
}
.foot-right { text-align:right; }
.foot-name {
  font-family:'Cormorant Garamond',serif;
  font-size:22px; font-weight:300; color:var(--white); letter-spacing:3px;
}
.foot-meta { font-size:9px; letter-spacing:3px; color:var(--muted); margin-top:6px; }

/* ─────────────────────────────────────────
   SCROLL REVEAL
───────────────────────────────────────── */
.reveal { opacity:0; transform:translateY(30px); transition:opacity .9s ease,transform .9s ease; }
.reveal.in { opacity:1; transform:none; }

/* ─────────────────────────────────────────
   RESPONSIVE
───────────────────────────────────────── */
@media(max-width:960px){
  nav { padding:20px 24px; }
  .nav-links { display:none; }
  nav.stuck { padding:14px 24px; }
  .hero { padding:0 24px 60px; }
  .hero-scroll { display:none; }
  .intro { grid-template-columns:1fr; padding:80px 24px; }
  .tasks-header { padding:0 24px 40px; }
  .task { grid-template-columns:1fr; }
  .task-l { padding:48px 24px; border-right:none; border-bottom:1px solid var(--line); }
  .task-r { padding:48px 24px; }
  .author-section { grid-template-columns:1fr; padding:80px 24px; }
  .author-visual { max-width:100%; }
  footer { flex-direction:column; gap:20px; padding:40px 24px; text-align:center; }
  .foot-right { text-align:center; }
}
</style>
</head>
<body>

<!-- CURSOR -->
<div id="cur"></div>
<div id="cur-ring"></div>

<!-- LOADER -->
<div id="loader">
  <div class="loader-name">JOYAL VARGHESE</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-pct">LOADING PORTFOLIO</div>
</div>

<!-- NAV -->
<nav id="nav">
  <a href="#" class="nav-logo">JV SYSTEMS</a>
  <ul class="nav-links">
    <li><a href="#tasks">Tasks</a></li>
    <li><a href="#author">About</a></li>
    <li><a href="#tasks">Components</a></li>
    <li><a href="#author">Contact</a></li>
  </ul>
  <a href="#tasks" class="nav-end">View Work</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-canvas"></div>
  <div class="hero-lines"></div>
  <div class="hero-tag">Embedded Systems Design · 7 Task Portfolio</div>
  <h1 class="hero-h1">Engineering<br/><em>Precision</em><br/>by Design</h1>
  <p class="hero-desc">Seven meticulously crafted hardware systems — from basic output control to full environmental monitoring. Every circuit purposeful. Every line of code deliberate.</p>
  <div class="hero-btns">
    <a href="#tasks" class="btn-a">Explore All Tasks</a>
    <a href="#author" class="btn-b">About the Creator</a>
  </div>
  <div class="hero-scroll"><span>Scroll</span><div class="scroll-line"></div></div>
</section>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-track">
    <span>Arduino Uno</span><span class="g">·</span>
    <span>C++ Programming</span><span class="g">·</span>
    <span>PWM Control</span><span class="g">·</span>
    <span>Sensor Integration</span><span class="g">·</span>
    <span>LCD Display</span><span class="g">·</span>
    <span>7 Systems Designed</span><span class="g">·</span>
    <span>Real-World Applications</span><span class="g">·</span>
    <span>Joyal Varghese</span><span class="g">·</span>
    <span>Arduino Uno</span><span class="g">·</span>
    <span>C++ Programming</span><span class="g">·</span>
    <span>PWM Control</span><span class="g">·</span>
    <span>Sensor Integration</span><span class="g">·</span>
    <span>LCD Display</span><span class="g">·</span>
    <span>7 Systems Designed</span><span class="g">·</span>
    <span>Real-World Applications</span><span class="g">·</span>
    <span>Joyal Varghese</span><span class="g">·</span>
  </div>
</div>

<!-- INTRO -->
<section class="intro">
  <div class="intro-left reveal">
