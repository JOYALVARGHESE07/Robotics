  <!-- ── TASK 7 ── -->
  <div class="task t7 reveal">
    <div class="task-l">
      <div class="task-num-bg">07</div>
      <div>
        <div class="task-index">Task 07 · Monitoring System</div>
        <h2 class="task-title">DHT11 Climate<br/><em>Monitor</em></h2>
        <div class="task-sub">Temperature & Humidity with Threshold Alerts</div>
        <p class="task-desc">A DHT11 sensor reads ambient temperature and humidity every 2 seconds, displays values on a 16×2 LCD, and triggers a buzzer and red LED when either parameter exceeds safe thresholds.</p>
        <div class="task-chips">
          <div class="chip hi">DHT11 Sensor</div>
          <div class="chip hi">16×2 LCD</div>
          <div class="chip hi">Buzzer + LED</div>
          <div class="chip">DHT.h Library</div>
        </div>
      </div>
      <div class="flow">
        <div class="flow-item"><div class="flow-n">1</div><div class="flow-t"><strong>READ</strong> · DHT11 every 2 seconds</div></div>
        <div class="flow-item"><div class="flow-n">2</div><div class="flow-t"><strong>DISPLAY</strong> · Temp + humidity on LCD</div></div>
        <div class="flow-item"><div class="flow-n">3</div><div class="flow-t"><strong>CHECK</strong> · Temp &gt;35°C or Hum &gt;80%</div></div>
        <div class="flow-item"><div class="flow-n">4</div><div class="flow-t"><strong>ALERT</strong> · Buzzer tone + LED activation</div></div>
      </div>
    </div>
    <div class="task-r">
      <div>
        <div class="pane-label">Arduino Code</div>
        <div class="code"><span class="c">// Task 7: Temp & Humidity Monitor
// Author: Joyal Varghese</span>

<span class="p">#include</span> &lt;<span class="f">DHT.h</span>&gt;
<span class="p">#include</span> &lt;<span class="f">LiquidCrystal.h</span>&gt;

<span class="p">#define</span> DHTPIN  <span class="v">6</span>
<span class="p">#define</span> DHTTYPE DHT11

DHT <span class="f">dht</span>(DHTPIN, DHTTYPE);
LiquidCrystal <span class="f">lcd</span>(<span class="v">12</span>,<span class="v">11</span>,<span class="v">5</span>,<span class="v">4</span>,<span class="v">3</span>,<span class="v">2</span>);

<span class="k">int</span> alertLED = <span class="v">13</span>;
<span class="k">int</span> buzzer   = <span class="v">9</span>;

<span class="k">void</span> <span class="f">setup</span>() {
  dht.<span class="f">begin</span>();
  lcd.<span class="f">begin</span>(<span class="v">16</span>, <span class="v">2</span>);
  <span class="f">pinMode</span>(alertLED, OUTPUT);
  <span class="f">pinMode</span>(buzzer,   OUTPUT);
}

<span class="k">void</span> <span class="f">loop</span>() {
  <span class="k">float</span> t = dht.<span class="f">readTemperature</span>();
  <span class="k">float</span> h = dht.<span class="f">readHumidity</span>();

  lcd.<span class="f">setCursor</span>(<span class="v">0</span>,<span class="v">0</span>);
  lcd.<span class="f">print</span>(<span class="s">"Temp: "</span>); lcd.<span class="f">print</span>(t,<span class="v">1</span>); lcd.<span class="f">print</span>(<span class="s">" C  "</span>);
  lcd.<span class="f">setCursor</span>(<span class="v">0</span>,<span class="v">1</span>);
  lcd.<span class="f">print</span>(<span class="s">"Hum:  "</span>); lcd.<span class="f">print</span>(h,<span class="v">1</span>); lcd.<span class="f">print</span>(<span class="s">" %  "</span>);

  <span class="k">if</span>(t > <span class="v">35.0</span> || h > <span class="v">80.0</span>) {
    <span class="f">digitalWrite</span>(alertLED, HIGH);
    <span class="f">tone</span>(buzzer, <span class="v">880</span>, <span class="v">500</span>);
  } <span class="k">else</span> {
    <span class="f">digitalWrite</span>(alertLED, LOW);
    <span class="f">noTone</span>(buzzer);
  }
  <span class="f">delay</span>(<span class="v">2000</span>);
}</div>
      </div>
