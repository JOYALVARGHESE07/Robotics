          <div style="color:var(--text-light);font-size:13px;font-family:'Cormorant Garamond',Georgia,serif;">Threshold &gt; 80%</div>
          <div style="color:var(--muted);font-size:10px;margin-top:4px;font-family:'Montserrat',sans-serif;">Buzzer + Red LED</div>
