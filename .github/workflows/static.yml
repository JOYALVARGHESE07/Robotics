<span class="cm">// Task 4: PIR Motion Alarm System</span>
<span class="cm">// Author: Joyal Varghese</span>

<span class="kw">int</span> pirPin = <span class="val">7</span>;
<span class="kw">int</span> buzzerPin = <span class="val">8</span>;
<span class="kw">int</span> ledPin = <span class="val">13</span>;
<span class="kw">int</span> motionState = <span class="val">0</span>;

<span class="kw">void</span> <span class="fn">setup</span>() {
  <span class="fn">pinMode</span>(pirPin, INPUT);
  <span class="fn">pinMode</span>(buzzerPin, OUTPUT);
  <span class="fn">pinMode</span>(ledPin, OUTPUT);
  Serial.<span class="fn">begin</span>(<span class="val">9600</span>);
}

<span class="kw">void</span> <span class="fn">triggerAlarm</span>() {
  <span class="kw">for</span>(<span class="kw">int</span> i = <span class="val">0</span>; i &lt; <span class="val">3</span>; i++) {
    <span class="fn">tone</span>(buzzerPin, <span class="val">1000</span>);
    <span class="fn">digitalWrite</span>(ledPin, HIGH);
    <span class="fn">delay</span>(<span class="val">300</span>);
    <span class="fn">noTone</span>(buzzerPin);
    <span class="fn">digitalWrite</span>(ledPin, LOW);
    <span class="fn">delay</span>(<span class="val">200</span>);
  }
}

<span class="kw">void</span> <span class="fn">loop</span>() {
  motionState = <span class="fn">digitalRead</span>(pirPin);
  <span class="kw">if</span>(motionState == HIGH) {
    Serial.<span class="fn">println</span>(<span class="str">"MOTION DETECTED"</span>);
    <span class="fn">triggerAlarm</span>();
    <span class="fn">delay</span>(<span class="val">2000</span>);
  }
}
      </div>
