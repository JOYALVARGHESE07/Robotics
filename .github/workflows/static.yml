          <tr><td>LED indicator</td><td>Pin 9</td><td>220Ω to GND</td></tr>
          <tr><td>Relay IN</td><td>Pin 8</td><td>Active LOW</td></tr>
          <tr><td>Relay VCC</td><td>5V</td><td>Module power</td></tr>
        </table>
      </div>
