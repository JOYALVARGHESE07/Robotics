        <div class="task-sub">Hysteresis-Based Ambient Light Control</div>
        <p class="task-desc">An LDR voltage divider reads ambient illuminance. A hysteresis band between dark and bright thresholds prevents rapid relay switching — the same logic used in smart city street lighting networks.</p>
        <div class="task-chips">
          <div class="chip hi">LDR Sensor</div>
          <div class="chip hi">Relay Module</div>
